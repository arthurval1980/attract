name: Build Attract Mode for Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      # в”Ђв”Ђ 1. Baixa o cГіdigo-fonte в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout Attract Mode
        uses: actions/checkout@v4

      # в”Ђв”Ђ 2. Instala ferramentas base e MinGW в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Install build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential git cmake make pkg-config \
            wget unzip p7zip-full nasm yasm \
            autoconf automake libtool python3 \
            mingw-w64 mingw-w64-tools

      # в”Ђв”Ђ 3. Define variГЎveis de ambiente в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Set environment variables
        run: |
          echo "PREFIX=$HOME/prefix"          >> $GITHUB_ENV
          echo "HOST=x86_64-w64-mingw32"      >> $GITHUB_ENV

      - name: Create prefix directory
        run: mkdir -p $HOME/prefix/{bin,include,lib/pkgconfig}

      # в”Ђв”Ђ 4. Compila zlib в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build zlib
        run: |
          cd /tmp
          wget -q https://zlib.net/zlib-1.3.1.tar.gz
          tar xzf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          make -f win32/Makefile.gcc \
            PREFIX=${HOST}- \
            BINARY_PATH=$PREFIX/bin \
            INCLUDE_PATH=$PREFIX/include \
            LIBRARY_PATH=$PREFIX/lib \
            SHARED_MODE=1 install

      # в”Ђв”Ђ 5. Compila libpng в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build libpng
        run: |
          cd /tmp
          wget -q https://sourceforge.net/projects/libpng/files/libpng16/1.6.43/libpng-1.6.43.tar.gz
          tar xzf libpng-1.6.43.tar.gz
          cd libpng-1.6.43
          ./configure \
            --host=$HOST --prefix=$PREFIX \
            --enable-shared --disable-static \
            CPPFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib"
          make -j$(nproc) && make install

      # в”Ђв”Ђ 6. Compila libogg в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build libogg
        run: |
          cd /tmp
          wget -q https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.gz
          tar xzf libogg-1.3.5.tar.gz
          cd libogg-1.3.5
          ./configure \
            --host=$HOST --prefix=$PREFIX \
            --enable-shared --disable-static
          make -j$(nproc) && make install

      # в”Ђв”Ђ 7. Compila libvorbis в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build libvorbis
        run: |
          cd /tmp
          wget -q https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.gz
          tar xzf libvorbis-1.3.7.tar.gz
          cd libvorbis-1.3.7
          ./configure \
            --host=$HOST --prefix=$PREFIX \
            --enable-shared --disable-static \
            CPPFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib"
          make -j$(nproc) && make install

      # в”Ђв”Ђ 8. Compila libflac в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build libflac
        run: |
          cd /tmp
          wget -q https://ftp.osuosl.org/pub/xiph/releases/flac/flac-1.4.3.tar.xz
          tar xJf flac-1.4.3.tar.xz
          cd flac-1.4.3
          ./configure \
            --host=$HOST --prefix=$PREFIX \
            --enable-shared --disable-static \
            --disable-doxygen-docs \
            --disable-xmms-plugin \
            --disable-cpplibs \
            CPPFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib"
          make -j$(nproc) && make install

      # в”Ђв”Ђ 9. Compila OpenAL-Soft в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build OpenAL-Soft
        run: |
          cd /tmp
          wget -q https://github.com/kcat/openal-soft/archive/refs/tags/1.23.1.tar.gz \
            -O openal-soft-1.23.1.tar.gz
          tar xzf openal-soft-1.23.1.tar.gz
          cd openal-soft-1.23.1
          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=${HOST}-gcc \
            -DCMAKE_CXX_COMPILER=${HOST}-g++ \
            -DCMAKE_RC_COMPILER=${HOST}-windres \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DALSOFT_UTILS=OFF \
            -DALSOFT_EXAMPLES=OFF \
            -DALSOFT_TESTS=OFF \
            -DBUILD_SHARED_LIBS=ON
          make -j$(nproc) && make install

      # в”Ђв”Ђ 10. Compila freetype в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build freetype
        run: |
          cd /tmp
          wget -q https://sourceforge.net/projects/freetype/files/freetype2/2.13.2/freetype-2.13.2.tar.gz
          tar xzf freetype-2.13.2.tar.gz
          cd freetype-2.13.2
          ./configure \
            --host=$HOST --prefix=$PREFIX \
            --enable-shared --disable-static \
            --with-zlib --with-png \
            --without-harfbuzz \
            CPPFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib"
          make -j$(nproc) && make install

      # в”Ђв”Ђ 11. Compila SFML 2.6.1 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build SFML
        run: |
          cd /tmp
          wget -q https://github.com/SFML/SFML/archive/refs/tags/2.6.1.tar.gz \
            -O sfml-2.6.1.tar.gz
          tar xzf sfml-2.6.1.tar.gz
          cd SFML-2.6.1
          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=${HOST}-gcc \
            -DCMAKE_CXX_COMPILER=${HOST}-g++ \
            -DCMAKE_RC_COMPILER=${HOST}-windres \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DCMAKE_FIND_ROOT_PATH=$PREFIX \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DSFML_BUILD_EXAMPLES=OFF \
            -DSFML_BUILD_DOC=OFF \
            -DSFML_USE_SYSTEM_DEPS=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DFREETYPE_INCLUDE_DIR_freetype2=$PREFIX/include/freetype2 \
            -DFREETYPE_INCLUDE_DIR_ft2build=$PREFIX/include \
            -DFREETYPE_LIBRARY=$PREFIX/lib/libfreetype.dll.a \
            -DOPENAL_INCLUDE_DIR=$PREFIX/include \
            -DOPENAL_LIBRARY=$PREFIX/lib/libOpenAL32.dll.a
          make -j$(nproc) && make install

      # в”Ђв”Ђ 12. Compila FFmpeg в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build FFmpeg
        run: |
          cd /tmp
          wget -q https://ffmpeg.org/releases/ffmpeg-6.1.1.tar.xz
          tar xJf ffmpeg-6.1.1.tar.xz
          cd ffmpeg-6.1.1
          ./configure \
            --prefix=$PREFIX \
            --cross-prefix=${HOST}- \
            --arch=x86_64 \
            --target-os=mingw32 \
            --enable-cross-compile \
            --enable-shared \
            --disable-static \
            --disable-programs \
            --disable-doc \
            --disable-debug \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swscale \
            --enable-swresample \
            --disable-network \
            --disable-everything \
            --enable-decoder=h264 \
            --enable-decoder=hevc \
            --enable-decoder=mpeg4 \
            --enable-decoder=vp8 \
            --enable-decoder=vp9 \
            --enable-decoder=theora \
            --enable-decoder=aac \
            --enable-decoder=mp3 \
            --enable-decoder=vorbis \
            --enable-decoder=flac \
            --enable-demuxer=mp4 \
            --enable-demuxer=matroska \
            --enable-demuxer=avi \
            --enable-demuxer=ogg \
            --enable-demuxer=flv \
            --enable-demuxer=mov \
            --enable-parser=h264 \
            --enable-parser=hevc \
            --enable-parser=aac \
            --enable-parser=vp8 \
            --enable-parser=vp9 \
            --enable-protocol=file \
            --pkg-config=pkg-config \
            --extra-cflags="-I$PREFIX/include" \
            --extra-ldflags="-L$PREFIX/lib"
          make -j$(nproc) && make install

      # в”Ђв”Ђ 13. Compila o Attract Mode в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build Attract Mode
        run: |
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
          export PKG_CONFIG_LIBDIR=$PREFIX/lib/pkgconfig
          make \
            CC=${HOST}-gcc \
            CXX=${HOST}-g++ \
            STRIP=${HOST}-strip \
            WINDRES=${HOST}-windres \
            prefix=$PREFIX \
            USE_SYSTEM_SFML=1 \
            USE_SYSTEM_FFMPEG=1 \
            CFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib" \
            -j$(nproc)

      # в”Ђв”Ђ 14. Monta a pasta de distribuiГ§ГЈo в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Assemble distribution folder
        run: |
          mkdir -p dist

          # ExecutГЎvel principal
          cp attract.exe dist/

          # DLLs que compilamos
          cp $PREFIX/bin/*.dll dist/

          # DLLs de runtime do MinGW
          GCC_VER=$(x86_64-w64-mingw32-gcc -dumpversion | cut -d. -f1)
          MINGW_PATH="/usr/lib/gcc/x86_64-w64-mingw32/${GCC_VER}-win32"
          [ -d "$MINGW_PATH" ] || MINGW_PATH="/usr/lib/gcc/x86_64-w64-mingw32/${GCC_VER}"

          cp "$MINGW_PATH/libstdc++-6.dll"    dist/ 2>/dev/null || true
          cp "$MINGW_PATH/libgcc_s_seh-1.dll" dist/ 2>/dev/null || true
          cp /usr/x86_64-w64-mingw32/lib/libwinpthread-1.dll dist/ 2>/dev/null || true

          # Recursos do Attract Mode
          [ -d config  ] && cp -r config  dist/
          [ -d layouts ] && cp -r layouts dist/

          echo "=== Conteudo da pasta dist ==="
          ls -lh dist/

      # в”Ђв”Ђ 15. Faz upload do resultado como artifact в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: attract-mode-windows-x64
          path: dist/
          retention-days: 30
