name: Build Attract Mode for Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout Attract Mode
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential git cmake make pkg-config \
            wget unzip p7zip-full nasm yasm \
            autoconf automake libtool python3 \
            mingw-w64 mingw-w64-tools

      - name: Create prefix directory
        run: |
          mkdir -p $HOME/prefix/bin
          mkdir -p $HOME/prefix/include
          mkdir -p $HOME/prefix/lib/pkgconfig

      - name: Build zlib
        run: |
          cd /tmp
          wget -q https://zlib.net/zlib-1.3.1.tar.gz
          tar xzf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          make -f win32/Makefile.gcc \
            PREFIX=x86_64-w64-mingw32- \
            BINARY_PATH=$HOME/prefix/bin \
            INCLUDE_PATH=$HOME/prefix/include \
            LIBRARY_PATH=$HOME/prefix/lib \
            SHARED_MODE=1 install

      - name: Build libpng
        run: |
          cd /tmp
          wget -q https://sourceforge.net/projects/libpng/files/libpng16/1.6.43/libpng-1.6.43.tar.gz
          tar xzf libpng-1.6.43.tar.gz
          cd libpng-1.6.43
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix=$HOME/prefix \
            --enable-shared \
            --disable-static \
            CPPFLAGS="-I$HOME/prefix/include" \
            LDFLAGS="-L$HOME/prefix/lib"
          make -j$(nproc)
          make install

      - name: Build libogg
        run: |
          cd /tmp
          wget -q https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.gz
          tar xzf libogg-1.3.5.tar.gz
          cd libogg-1.3.5
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix=$HOME/prefix \
            --enable-shared \
            --disable-static
          make -j$(nproc)
          make install

      - name: Build libvorbis
        run: |
          cd /tmp
          wget -q https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.gz
          tar xzf libvorbis-1.3.7.tar.gz
          cd libvorbis-1.3.7
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix=$HOME/prefix \
            --enable-shared \
            --disable-static \
            CPPFLAGS="-I$HOME/prefix/include" \
            LDFLAGS="-L$HOME/prefix/lib"
          make -j$(nproc)
          make install

      - name: Build libflac
        run: |
          cd /tmp
          wget -q https://ftp.osuosl.org/pub/xiph/releases/flac/flac-1.4.3.tar.xz
          tar xJf flac-1.4.3.tar.xz
          cd flac-1.4.3
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix=$HOME/prefix \
            --enable-shared \
            --disable-static \
            --disable-doxygen-docs \
            --disable-xmms-plugin \
            --disable-cpplibs \
            CPPFLAGS="-I$HOME/prefix/include" \
            LDFLAGS="-L$HOME/prefix/lib"
          make -j$(nproc)
          make install

      - name: Build OpenAL-Soft
        run: |
          cd /tmp
          wget -q https://github.com/kcat/openal-soft/archive/refs/tags/1.23.1.tar.gz \
            -O openal-soft-1.23.1.tar.gz
          tar xzf openal-soft-1.23.1.tar.gz
          cd openal-soft-1.23.1
          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres \
            -DCMAKE_INSTALL_PREFIX=$HOME/prefix \
            -DALSOFT_UTILS=OFF \
            -DALSOFT_EXAMPLES=OFF \
            -DALSOFT_TESTS=OFF \
            -DBUILD_SHARED_LIBS=ON
          make -j$(nproc)
          make install

      - name: Build freetype
        run: |
          cd /tmp
          wget -q https://sourceforge.net/projects/freetype/files/freetype2/2.13.2/freetype-2.13.2.tar.gz
          tar xzf freetype-2.13.2.tar.gz
          cd freetype-2.13.2
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix=$HOME/prefix \
            --enable-shared \
            --disable-static \
            --with-zlib \
            --with-png \
            --without-harfbuzz \
            CPPFLAGS="-I$HOME/prefix/include" \
            LDFLAGS="-L$HOME/prefix/lib"
          make -j$(nproc)
          make install

      - name: Build SFML
        run: |
          cd /tmp
          wget -q https://github.com/SFML/SFML/archive/refs/tags/2.6.1.tar.gz \
            -O sfml-2.6.1.tar.gz
          tar xzf sfml-2.6.1.tar.gz
          cd SFML-2.6.1
          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres \
            -DCMAKE_INSTALL_PREFIX=$HOME/prefix \
            -DCMAKE_FIND_ROOT_PATH=$HOME/prefix \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DSFML_BUILD_EXAMPLES=OFF \
            -DSFML_BUILD_DOC=OFF \
            -DSFML_USE_SYSTEM_DEPS=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DFREETYPE_INCLUDE_DIR_freetype2=$HOME/prefix/include/freetype2 \
            -DFREETYPE_INCLUDE_DIR_ft2build=$HOME/prefix/include \
            -DFREETYPE_LIBRARY=$HOME/prefix/lib/libfreetype.dll.a \
            -DOPENAL_INCLUDE_DIR=$HOME/prefix/include \
            -DOPENAL_LIBRARY=$HOME/prefix/lib/libOpenAL32.dll.a
          make -j$(nproc)
          make install

      - name: Build FFmpeg
        run: |
          cd /tmp
          wget -q https://ffmpeg.org/releases/ffmpeg-6.1.1.tar.xz
          tar xJf ffmpeg-6.1.1.tar.xz
          cd ffmpeg-6.1.1
          ./configure \
            --prefix=$HOME/prefix \
            --cross-prefix=x86_64-w64-mingw32- \
            --arch=x86_64 \
            --target-os=mingw32 \
            --enable-cross-compile \
            --enable-shared \
            --disable-static \
            --disable-programs \
            --disable-doc \
            --disable-debug \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swscale \
            --enable-swresample \
            --disable-network \
            --disable-everything \
            --enable-decoder=h264 \
            --enable-decoder=hevc \
            --enable-decoder=mpeg4 \
            --enable-decoder=vp8 \
            --enable-decoder=vp9 \
            --enable-decoder=theora \
            --enable-decoder=aac \
            --enable-decoder=mp3 \
            --enable-decoder=vorbis \
            --enable-decoder=flac \
            --enable-demuxer=mp4 \
            --enable-demuxer=matroska \
            --enable-demuxer=avi \
            --enable-demuxer=ogg \
            --enable-demuxer=flv \
            --enable-demuxer=mov \
            --enable-parser=h264 \
            --enable-parser=hevc \
            --enable-parser=aac \
            --enable-parser=vp8 \
            --enable-parser=vp9 \
            --enable-protocol=file \
            --pkg-config=pkg-config \
            --extra-cflags="-I$HOME/prefix/include" \
            --extra-ldflags="-L$HOME/prefix/lib"
          make -j$(nproc)
          make install

      - name: Build Attract Mode
        run: |
          export PKG_CONFIG_PATH=$HOME/prefix/lib/pkgconfig
          export PKG_CONFIG_LIBDIR=$HOME/prefix/lib/pkgconfig
          make \
            CC=x86_64-w64-mingw32-gcc \
            CXX=x86_64-w64-mingw32-g++ \
            STRIP=x86_64-w64-mingw32-strip \
            WINDRES=x86_64-w64-mingw32-windres \
            prefix=$HOME/prefix \
            USE_SYSTEM_SFML=1 \
            USE_SYSTEM_FFMPEG=1 \
            CFLAGS="-I$HOME/prefix/include" \
            LDFLAGS="-L$HOME/prefix/lib" \
            -j$(nproc)

      - name: Assemble distribution folder
        run: |
          mkdir -p dist

          cp attract.exe dist/

          cp $HOME/prefix/bin/*.dll dist/ 2>/dev/null || true

          GCC_VER=$(x86_64-w64-mingw32-gcc -dumpversion | cut -d. -f1)
          MINGW_PATH="/usr/lib/gcc/x86_64-w64-mingw32/${GCC_VER}-win32"
          if [ ! -d "$MINGW_PATH" ]; then
            MINGW_PATH="/usr/lib/gcc/x86_64-w64-mingw32/${GCC_VER}"
          fi

          cp "$MINGW_PATH/libstdc++-6.dll"    dist/ 2>/dev/null || true
          cp "$MINGW_PATH/libgcc_s_seh-1.dll" dist/ 2>/dev/null || true
          cp /usr/x86_64-w64-mingw32/lib/libwinpthread-1.dll dist/ 2>/dev/null || true

          if [ -d config ];  then cp -r config  dist/; fi
          if [ -d layouts ]; then cp -r layouts dist/; fi

          echo "Conteudo da pasta dist:"
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: attract-mode-windows-x64
          path: dist/
          retention-days: 30
